<!DOCTYPE html>
<html>
<head>
    <title>Daftar Akun Baru</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; width: 80%; max-width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        a { color: #d4af37; text-decoration: none; font-size: 0.8em; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Buat Akun</h2>
    <input type="email" id="email" placeholder="Masukkan Email">
    <input type="password" id="pass" placeholder="Buat Password (min 6 karakter)">
    <button id="btnDaftar">Daftar Sekarang</button>
    <a href="index.html">Sudah punya akun? Login</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPbK3U6Yoe8qNINXCwrX5WOMyGgfHqwiU",
        authDomain: "wedding-alvin-ima.firebaseapp.com",
        projectId: "wedding-alvin-ima",
        appId: "1:1026738748582:web:eeb9029dbe1987cfdd4867"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('btnDaftar').onclick = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        
        createUserWithEmailAndPassword(auth, email, pass)
            .then((userCredential) => {
                alert("Pendaftaran Sukses! Sekarang silakan Login.");
                window.location.href = "index.html";
            })
            .catch((error) => {
                alert("Gagal Daftar: " + error.message);
            });
    };
</script>
</body>
</html>
