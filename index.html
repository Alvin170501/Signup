<!DOCTYPE html>
<html>
<head>
    <title>Login - Web Privat Alvin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; }
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #d4af37; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box">
    <h2>Privat Area</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button id="btnLogin">Masuk</button>

    <p style="font-size: 0.8em; margin-top: 15px;">
        Belum punya akun? <a href="daftar.html" style="color: #d4af37; text-decoration: none;">Daftar di sini</a>
    </p>
</div>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // PASTE FIREBASE CONFIG KAMU DI SINI
    const firebaseConfig = {
        apiKey: "AIzaSyDPbK3U6Yoe8qNINXCwrX5WOMyGgfHqwiU",
        authDomain: "wedding-alvin-ima.firebaseapp.com",
        projectId: "wedding-alvin-ima",
        appId: "1:1026738748582:web:eeb9029dbe1987cfdd4867"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Cek status login
    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "rahasia.html";
    });

    // Proses Login
    document.getElementById('btnLogin').onclick = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        
        signInWithEmailAndPassword(auth, email, pass)
            .then(() => alert("Berhasil Masuk!"))
            .catch(err => alert("Error: " + err.message));
    };
</script>
</body>
</html>
