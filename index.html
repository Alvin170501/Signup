<!DOCTYPE html>
<html>
<head>
    <title>Login - Memory Lane</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 85%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2c2c2c; color: white; box-sizing: border-box; }
        button { background: #d4af37; color: black; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        a { color: #888; text-decoration: none; font-size: 0.8em; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Privat Area</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button id="btnLogin">Masuk</button>
    <a href="daftar.html">Belum punya akun? Daftar</a>
</div>

<script type="module">
    // 1. IMPORT FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, setPersistence, browserLocalPersistence, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 2. CONFIG (Data kamu)
    const firebaseConfig = {
        apiKey: "AIzaSyD0MWAd2w1Ed_woeyCpkctLJ5qQ_ioySiY",
        authDomain: "wedding-alvin-ima.firebaseapp.com",
        projectId: "wedding-alvin-ima",
        appId: "1:1026738748582:web:eeb9029dbe1987cfdd4867"
    };

    // 3. INISIALISASI
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 4. PROSES LOGIN
    document.getElementById('btnLogin').onclick = () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        if(!email || !pass) return alert("Isi email dan password dulu, Vin!");

        // Set supaya login nggak ilang pas refresh
        setPersistence(auth, browserLocalPersistence)
            .then(() => {
                return signInWithEmailAndPassword(auth, email, pass);
            })
            .then(() => {
                // Berhasil login, pindah ke rahasia
                window.location.replace("rahasia.html");
            })
            .catch((error) => {
                alert("Gagal Masuk: " + error.message);
            });
    };
</script>
</body>
</html>
