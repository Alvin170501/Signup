<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary Rahasia Alvin & Ima</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Form Input */
        .form-box { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #d4af37; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; }
        button { cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        #btnSimpan { width: 100%; background: #d4af37; color: black; border: none; padding: 12px; font-size: 16px; }
        #btnLogout { background: #ff4d4d; color: white; border: none; padding: 8px 15px; }

        /* List Diary */
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #d4af37; }
        .card h4 { margin: 0; color: #d4af37; }
        .card small { color: #888; display: block; margin-bottom: 10px; }
        .card p { margin: 0; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>📓 Our Diary</h2>
        <button id="btnLogout">Logout</button>
    </header>

    <div class="form-box">
        <h4>Tulis Kenangan Baru ✍️</h4>
        <input type="text" id="judul" placeholder="Judul momen (ex: Pertama Ketemu)">
        <textarea id="cerita" rows="4" placeholder="Ceritain detailnya di sini, Vin..."></textarea>
        <button id="btnSimpan">Simpan ke Memory</button>
    </div>

    <div id="list-diary">
        <p style="text-align: center; color: #666;">Memuat kenangan...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // --- PASTE FIREBASE CONFIG KAMU DI SINI ---
    const firebaseConfig = {
        apiKey: "AIzaSyD0MWAd2w1Ed_woeyCpkctLJ5qQ_ioySiY",
        authDomain: "wedding-alvin-ima.firebaseapp.com",
        projectId: "wedding-alvin-ima",
        appId: "1:1026738748582:web:eeb9029dbe1987cfdd4867"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. SATPAM: Cek Login
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html"; // Tendang keluar jika belum login
        } else {
            loadDiary(); // Jika login, tampilkan data
        }
    });

    // 2. LOGIKA SIMPAN DIARY
    window.simpanDiary = async () => {
        const judul = document.getElementById('judul').value;
        const cerita = document.getElementById('cerita').value;

        if (!judul || !cerita) return alert("Isi dulu judul sama ceritanya, Vin!");

        try {
            await addDoc(collection(db, "diary_alvin"), {
                judul: judul,
                cerita: cerita,
                waktu: serverTimestamp()
            });
            document.getElementById('judul').value = "";
            document.getElementById('cerita').value = "";
            alert("Kenangan berhasil disimpan! ✨");
        } catch (e) {
            alert("Gagal simpan: " + e.message);
        }
    };
    document.getElementById('btnSimpan').onclick = simpanDiary;

    // 3. LOGIKA TAMPILIN DIARY (Otomatis Update)
    function loadDiary() {
        const q = query(collection(db, "diary_alvin"), orderBy("waktu", "desc"));
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('list-diary');
            listDiv.innerHTML = "";
            
            if (snapshot.empty) {
                listDiv.innerHTML = "<p style='text-align:center;'>Belum ada kenangan. Yuk tulis sesuatu!</p>";
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const waktu = data.waktu ? data.waktu.toDate().toLocaleDateString('id-ID') : 'Baru saja';
                
                listDiv.innerHTML += `
                    <div class="card">
                        <h4>${data.judul}</h4>
                        <small>📅 ${waktu}</small>
                        <p>${data.cerita}</p>
                    </div>
                `;
            });
        });
    }

    // 4. LOGIKA LOGOUT
    document.getElementById('btnLogout').onclick = () => {
        signOut(auth).then(() => window.location.href = "index.html");
    };
</script>
</body>
</html>
