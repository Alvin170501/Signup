<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary Rahasia Alvin & Ima</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .form-box { background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #d4af37; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; }
        #btnSimpan { width: 100%; background: #d4af37; color: black; border: none; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 8px; }
        #btnLogout { background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #d4af37; }
        .card h4 { margin: 0; color: #d4af37; }
        .card p { margin: 10px 0 0; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h3>📓 Our Diary</h3>
        <button id="btnLogout">Logout</button>
    </header>

    <div class="form-box">
        <input type="text" id="judul" placeholder="Judul momen...">
        <textarea id="cerita" rows="4" placeholder="Tulis ceritanya, Vin..."></textarea>
        <button id="btnSimpan">Simpan ke Memory</button>
    </div>

    <div id="list-diary">
        <p style="text-align: center; color: #666;">Memuat kenangan...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0MWAd2w1Ed_woeyCpkctLJ5qQ_ioySiY",
        authDomain: "wedding-alvin-ima.firebaseapp.com",
        projectId: "wedding-alvin-ima",
        appId: "1:1026738748582:web:eeb9029dbe1987cfdd4867"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // SATPAM: Tunggu status login stabil
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            // Kalau fix nggak login, baru pindahin
            window.location.replace("index.html");
        } else {
            loadDiary();
        }
    });

    window.simpanDiary = async () => {
        const judul = document.getElementById('judul').value;
        const cerita = document.getElementById('cerita').value;
        if (!judul || !cerita) return alert("Isi dulu, Vin!");

        try {
            await addDoc(collection(db, "diary_alvin"), {
                judul: judul,
                cerita: cerita,
                waktu: serverTimestamp()
            });
            document.getElementById('judul').value = "";
            document.getElementById('cerita').value = "";
        } catch (e) {
            alert("Gagal: " + e.message);
        }
    };
    document.getElementById('btnSimpan').onclick = simpanDiary;

    function loadDiary() {
        const q = query(collection(db, "diary_alvin"), orderBy("waktu", "desc"));
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('list-diary');
            listDiv.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                listDiv.innerHTML += `
                    <div class="card">
                        <h4>${data.judul}</h4>
                        <p>${data.cerita}</p>
                    </div>
                `;
            });
        });
    }

    document.getElementById('btnLogout').onclick = () => {
        signOut(auth).then(() => window.location.replace("index.html"));
    };
</script>
</body>
</html>
